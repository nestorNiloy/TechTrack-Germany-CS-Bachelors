<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Germany CS Bachelor Map — Dual-Study &amp; Full-Time</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <header class="board">
    <h1 class="board__title">CS Bachelor <span>Map</span> · Germany</h1>
    <div class="board__stats">
      <div class="stat">
        <span class="stat__value" id="stat-total">0</span>
        <span class="stat__label">Programs</span>
      </div>
      <div class="stat">
        <span class="stat__value" id="stat-dual">0</span>
        <span class="stat__label">Dual-study</span>
      </div>
      <div class="stat">
        <span class="stat__value" id="stat-free">0</span>
        <span class="stat__label">Tuition-free</span>
      </div>
    </div>
  </header>

  <aside class="sidebar">
    <div class="filters">
      <div class="filter-row">
        <label>Type</label>
        <div class="toggle-group">
          <button data-type="all" class="active">All</button>
          <button data-type="dual">Dual</button>
          <button data-type="fulltime">Full-time</button>
        </div>
      </div>

      <input type="text" id="search" placeholder="Search university, program, or city…" />

      <div class="checkbox-row">
        <input type="checkbox" id="free-only" />
        <label for="free-only">Tuition-free only</label>
      </div>
    </div>

    <div class="list" id="list"></div>
  </aside>

  <main id="map"></main>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
